<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR. RAVI KUMAR PRAJAPAT - VIP SERVER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }
        .main-container {
            max-width: 500px;
            margin: auto;
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #0f0;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
        }
        .header-title {
            text-align: center;
            background: #0f0;
            color: #000;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        .form-label {
            font-weight: bold;
            margin-top: 10px;
        }
        .form-control {
            background: #000;
            border: 1px solid #0f0;
            color: #fff;
            margin-bottom: 15px;
        }
        .form-control:focus {
            background: #050505;
            border-color: #0f0;
            color: #fff;
            box-shadow: 0 0 10px #0f0;
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #0f0;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background: #39ff14;
            transform: scale(1.02);
        }
        .log-box {
            margin-top: 25px;
            height: 150px;
            background: #000;
            border: 1px dashed #0f0;
            overflow-y: auto;
            padding: 10px;
            font-size: 13px;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-title">
        🦋 MR. RAVI KUMAR PRAJAPAT 🦋
    </div>

    <form action="/" method="POST" enctype="multipart/form-data">
        <label class="form-label">Convo / Inbox ID:</label>
        <input type="number" name="threadId" class="form-control" placeholder="Enter Thread ID" required>

        <label class="form-label">Hater Name:</label>
        <input type="text" name="kidx" class="form-control" placeholder="Enter Hater Name">

        <label class="form-label">Here Name:</label>
        <input type="text" name="here" class="form-control" placeholder="Enter Here Name">

        <label class="form-label">Speed (Seconds):</label>
        <input type="number" name="time" class="form-control" value="10" required>

        <label class="form-label">Select Message File (.txt):</label>
        <input type="file" name="messagesFile" class="form-control" accept=".txt" required>

        <label class="form-label">Select Token File (.txt):</label>
        <input type="file" name="txtFile" class="form-control" accept=".txt" required>

        <button type="submit" class="btn-submit">START ATTACK 🚀</button>
    </form>

    <div class="log-box">
        <p style="color: yellow;">[SYSTEM] Server Logs will appear here...</p>
        {% for log in logs %}
            <div>{{ log }}</div>
        {% endfor %}
    </div>

    <div class="footer text-center">
        © 2026 MR. RAVI KUMAR PRAJAPAT | ALL RIGHTS RESERVED
    </div>
</div>

</body>
</html>
